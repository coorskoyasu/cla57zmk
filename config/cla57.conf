# BLE settings
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# RGB underglow for LED layer indicators
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Startup: white color with breathing effect (simulates 5sec blink on connection)
# The first layer-switch action will set the LED to the correct layer color (solid).
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT=100
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=1
